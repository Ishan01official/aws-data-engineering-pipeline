name: CI
# Purpose: lint + unit-test Python on every push/PR. No AWS credentials needed.
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest boto3
      - name: Lint
        run: ruff check src tests || true   # TODO: drop the '|| true' once code is in
      - name: Unit tests
        run: pytest tests/unit -q || true     # TODO: drop the '|| true' once tests exist
