name: CDK Deploy (dev)
# Purpose: deploy infra to the DEV account via OIDC (no stored AWS keys).
# SAFETY: manual trigger only. Deploys billable resources. Review before running.
on:
  workflow_dispatch: {}   # manual only — never auto-deploy paid resources
permissions:
  id-token: write   # required for OIDC
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}   # set in repo/env secrets
          aws-region: ${{ vars.AWS_REGION }}
      - name: Install CDK + deps
        run: |
          npm install -g aws-cdk
          pip install -r infra/cdk/requirements.txt
      - name: CDK synth & deploy
        working-directory: infra/cdk
        run: |
          cdk synth
          cdk deploy --all --require-approval never
        # TODO: scope to specific stacks before enabling for real
