name: Lint Docs
# Purpose: catch broken Markdown links so the repo stays navigable on GitHub.
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  markdown-link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          config-file: ".github/workflows/mlc-config.json"
